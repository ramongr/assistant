---
name: Docs

# Docsify is a client-side SPA: there is no build step. We upload the
# raw `docs/` tree as the Pages artifact and let docsify fetch markdown
# files at runtime. `docs/.nojekyll` tells GitHub to skip its own
# Jekyll pre-processor on the artifact.

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs.yml
  pull_request:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  upload:
    name: Upload docs/ artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: upload
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
