---
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Default to least privilege; the release job opts into the perms it needs.
permissions:
  contents: read

jobs:
  release:
    name: Build and publish gem
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run tests before publishing
        run: bundle exec rake test

      - name: Configure trusted publishing
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Build gem
        run: gem build assistant.gemspec

      - name: Push gem to RubyGems
        run: gem push assistant-*.gem

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assistant-*.gem
