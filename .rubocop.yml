inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-performance
  - rubocop-minitest

require:
  - rubocop-rake

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - '.git/**/*'
    - 'bin/*'
    - 'Gemfile.lock'

Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

Gemspec/DependencyVersion:
  Enabled: true

Naming/PredicatePrefix:
  MethodDefinitionMacros:
    - define_method
    - define_singleton_method

# Tests use simple `def execute = true` to fabricate services; the boolean
# return doesn't make these predicate methods.
Naming/PredicateMethod:
  Exclude:
    - 'test/**/*.rb'

Layout/EndOfLine:
  EnforcedStyle: lf

Layout/ClassStructure:
  Enabled: true

Layout/RedundantLineBreak:
  Enabled: true

Layout/HashAlignment:
  EnforcedHashRocketStyle:
    - key
    - table
  EnforcedColonStyle:
    - key
    - table

Layout/LineLength:
  Max: 120

Style/RequireOrder:
  Enabled: true

# Test files use anonymous Class.new(...) blocks and dynamic define_method,
# which inflates length/metrics counts that don't reflect real complexity.
Metrics/BlockLength:
  Exclude:
    - 'Rakefile'
    - '**/*.rake'
    - 'test/**/*.rb'
    - '**/*.gemspec'

Metrics/ClassLength:
  Exclude:
    - 'test/**/*.rb'

Metrics/MethodLength:
  Exclude:
    - 'test/**/*.rb'

Naming/MethodParameterName:
  AllowedNames:
    - a
    - b
    - c

Minitest/MultipleAssertions:
  Max: 8
